{% extends "base.html" %}

{% block title %}Confirmar Exclusão{% endblock %}

{% block extra_css %}
<style>
    .delete-container { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; }
    .delete-card { max-width: 520px; width: 100%; border: none; border-radius: 1.25rem; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
    .delete-header { background: linear-gradient(135deg, #e74a3b, #be2617); padding: 2.5rem 2rem 2rem; text-align: center; color: #fff; position: relative; overflow: hidden; }
    .delete-header::after { content: ''; position: absolute; top: -40%; right: -15%; width: 220px; height: 220px; background: rgba(255,255,255,0.06); border-radius: 50%; }
    .delete-icon { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 2.25rem; }
    .delete-header h2 { font-weight: 700; font-size: 1.35rem; position: relative; }
    .delete-body { padding: 2rem 2.5rem 2.5rem; text-align: center; }
    .delete-target { background: #fff5f5; border: 1.5px solid #fed7d7; border-radius: 0.875rem; padding: 1rem 1.5rem; margin: 1.25rem 0; }
    .delete-target h5 { font-weight: 700; color: #2d3748; margin-bottom: 0; }
    .delete-actions { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.5rem; }
    .btn-delete-cancel { border: 2px solid #e2e8f0; color: #718096; padding: 0.75rem 1.75rem; border-radius: 0.625rem; font-weight: 600; background: transparent; }
    .btn-delete-cancel:hover { border-color: #cbd5e0; background: #f7fafc; color: #4a5568; }
    .btn-delete-confirm { background: linear-gradient(135deg, #e74a3b, #c82333); border: none; color: #fff; padding: 0.75rem 2rem; border-radius: 0.625rem; font-weight: 700; }
    .btn-delete-confirm:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(231,74,59,0.35); color: #fff; }

    [data-bs-theme="dark"] .delete-body { background: var(--bs-body-bg); }
    [data-bs-theme="dark"] .delete-target { background: rgba(231,74,59,0.06); border-color: rgba(231,74,59,0.15); }
    [data-bs-theme="dark"] .delete-target h5 { color: #e2e8f0; }
    [data-bs-theme="dark"] .btn-delete-cancel { border-color: #2d3748; color: #a0aec0; }
</style>
{% endblock %}

{% block content %}
<div class="delete-container">
    <div class="card delete-card">
        <div class="delete-header">
            <div class="delete-icon"><i class="bi bi-trash3-fill"></i></div>
            <h2>Confirmar Exclusão</h2>
        </div>
        <div class="delete-body">
            <p style="color: #4a5568;">Você está prestes a excluir permanentemente:</p>
            <div class="delete-target">
                <h5>{{ obj }}</h5>
            </div>
            <p class="text-muted small">Esta ação não pode ser desfeita.</p>
            <div class="delete-actions">
                <a href="{% url 'automovel:carro_list' %}" class="btn btn-delete-cancel">
                    <i class="bi bi-arrow-left me-1"></i> Cancelar
                </a>
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-delete-confirm">
                        <i class="bi bi-trash3 me-1"></i> Excluir
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
