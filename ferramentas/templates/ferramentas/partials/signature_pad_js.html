<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const canvas = document.getElementById('signature-pad');
    const clearButton = document.getElementById('clear-signature');

    if (!canvas || !clearButton) return;

    const form = canvas.closest('form');
    const signatureDataInput = form
        ? form.querySelector('[name="assinatura_base64"]')
        : null;

    if (!form || !signatureDataInput) {
        console.error("Formulário ou campo 'assinatura_base64' não encontrado.");
        return;
    }

    const signaturePad = new SignaturePad(canvas, {
        backgroundColor: 'rgb(255, 255, 255)'
    });

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    form.addEventListener('submit', function (event) {
        if (signaturePad.isEmpty()) {
            alert("Por favor, forneça uma assinatura para continuar.");
            event.preventDefault();
        } else {
            signatureDataInput.value = signaturePad.toDataURL('image/png');
        }
    });

    clearButton.addEventListener('click', function () {
        signaturePad.clear();
    });
});
</script>
