
<!-- ltcat/templates/ltcat/partials/_navbar.html -->
<nav class="navbar navbar-expand-lg border-bottom px-4 py-2">
    <!-- Mobile toggle -->
    <button class="btn btn-link text-body d-lg-none me-2 p-0 border-0"
            id="sidebarToggle" type="button">
        <i class="bi bi-list fs-4"></i>
    </button>

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="flex-grow-1">
        <ol class="breadcrumb mb-0 small">
            <li class="breadcrumb-item"><a href="{% url 'ltcat:dashboard' %}">LTCAT</a></li>
            {% block breadcrumb %}{% endblock %}
        </ol>
    </nav>

    <!-- Actions -->
    <div class="d-flex align-items-center gap-2">
        <!-- Theme Toggle -->
        <button class="btn btn-link text-body p-1 border-0" id="themeToggle"
                title="Alternar tema">
            <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
        </button>

        <!-- Logout -->
        <a href="{% url 'logout' %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-box-arrow-right"></i>
        </a>
    </div>
</nav>
