
<!-- templates/core/acesso_negado.html -->
{% extends "base.html" %}

{% block title %}Acesso Negado{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-sm border-danger">
                <div class="card-body py-5">
                    <i class="bi bi-shield-lock text-danger" style="font-size: 4rem;"></i>
                    <h2 class="mt-3 text-danger">{{ titulo|default:"Acesso Negado" }}</h2>
                    <p class="text-muted mt-3">
                        {{ mensagem|default:"Você não possui permissão para acessar este recurso." }}
                    </p>
                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i> Voltar
                        </a>
                        <a href="{% url 'usuario:profile' %}" class="btn btn-primary">
                            <i class="bi bi-house me-1"></i> Início
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
