{% extends 'usuario/base_usuario.html' %}

{% block title %}Excluir Grupo{% endblock %}

{% block usuario_content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirmar Exclusão</h5>
            </div>
            <div class="card-body text-center py-4">
                <i class="bi bi-people text-danger" style="font-size: 3rem;"></i>
                <p class="mt-3">
                    Excluir o grupo <strong>"{{ object.name }}"</strong>?
                </p>
                <p class="text-danger small">Esta ação não pode ser desfeita.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <a href="{% url 'usuario:grupo_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
                        {% if perms.usuario.delete_grupo %}
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>Excluir
                        </button>
                        {% endif %}
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
