
<!-- templates/tributacao/confirm_delete.html -->
{% extends "tributacao/base_tributacao.html" %}

{% block title %}Excluir {{ tipo }}{% endblock %}

{% block tributacao_content %}
<div class="container-fluid py-4">
    <div class="card border-danger" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header bg-danger text-white">
            <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmar Exclusão</h5>
        </div>
        <div class="card-body text-center">
            <p class="fs-5">Tem certeza que deseja excluir?</p>
            <p class="mb-1"><strong>{{ tipo }}:</strong></p>
            <p class="fs-4 text-danger">{{ objeto }}</p>
            <p class="text-muted small">Esta ação não pode ser desfeita.</p>

            <form method="post" class="mt-3">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Sim, Excluir
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">
                        <i class="bi bi-x"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
