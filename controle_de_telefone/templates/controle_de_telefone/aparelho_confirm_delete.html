
{% extends "controle_de_telefone/_base_telefone.html" %}

{% block title %}Excluir Aparelho{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-body p-5 text-center">
                    <div class="rounded-circle bg-danger bg-opacity-10 d-inline-flex align-items-center justify-content-center mb-4"
                         style="width: 72px; height: 72px;">
                        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 2rem;"></i>
                    </div>

                    <h4 class="fw-bold mb-2">Excluir Aparelho</h4>
                    <p class="text-muted mb-4" style="font-size: 0.9rem;">
                        Tem certeza que deseja excluir permanentemente
                        <strong class="text-dark">"{{ object }}"</strong>?
                    </p>

                    <div class="alert alert-danger bg-danger bg-opacity-10 border-0 d-flex align-items-center gap-2 mb-4"
                         style="font-size: 0.85rem;">
                        <i class="bi bi-info-circle flex-shrink-0"></i>
                        <span>Esta ação não pode ser desfeita.</span>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-2">
                            <a href="{% url 'controle_de_telefone:aparelho_list' %}" class="btn btn-light px-4">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                            <button type="submit" class="btn btn-danger px-4">
                                <i class="bi bi-trash3 me-1"></i>Sim, Excluir
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
