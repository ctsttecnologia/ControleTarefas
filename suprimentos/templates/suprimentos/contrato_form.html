{% extends "suprimentos/base_suprimentos.html" %}
{% load humanize crispy_forms_tags static %}

{% block title %}{{ titulo_pagina }}{% endblock %}

{% block sup_content %}
<div class="sup-page-head">
    <h2 class="sup-page-title">
        <i class="bi bi-file-earmark-text me-2"></i>{{ titulo_pagina }}
    </h2>
    <div class="sup-page-actions">
        <a href="{% url 'suprimentos:contrato_list' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Voltar
        </a>
    </div>
</div>
<hr>
<div class="mx-auto" style="max-width: 600px;">
    <div class="card sup-card shadow-sm">
        <div class="card-header bg-light">
            <h4 class="mb-0">
                <i class="bi bi-file-earmark-text me-2"></i>{{ titulo_pagina }}
            </h4>
        </div>
        <div class="card-body">
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'suprimentos:contrato_list' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i> Voltar
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i> Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock sup_content %}
