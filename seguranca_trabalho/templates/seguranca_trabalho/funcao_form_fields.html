
{% load crispy_forms_tags %}

<div class="row g-3">
    <div class="col-md-8">
        <label for="{{ form.nome.id_for_label }}" class="sst-form-label">
            Nome <span class="required">*</span>
        </label>
        {{ form.nome|as_crispy_field }}
    </div>

    <div class="col-md-4 d-flex align-items-center pt-3">
        <div class="form-check form-switch fs-5">
            {{ form.ativo }}
            <label class="form-check-label pt-1" for="{{ form.ativo.id_for_label }}">
                Cadastro Ativo
            </label>
        </div>
    </div>

    <div class="col-12">
        {{ form.descricao|as_crispy_field }}
    </div>

    {% if form.cargos %}
    <div class="col-12">
        <label class="sst-form-label">Vincular aos Cargos (Opcional)</label>
        {{ form.cargos|as_crispy_field }}
        <small class="form-text" style="color:var(--sst-text-muted);">
            Selecione os cargos que exercem esta função.
        </small>
    </div>
    {% endif %}
</div>
