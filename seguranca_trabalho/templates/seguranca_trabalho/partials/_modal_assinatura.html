
{# templates/seguranca_trabalho/partials/_modal_assinatura.html #}
{% load static %}

<!-- Modal de Assinatura EPI -->
<div class="modal fade" id="assinaturaModal" tabindex="-1" aria-labelledby="assinaturaModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form id="formAssinaturaModal" method="post" action="" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="assinaturaModalLabel">
                        <i class="bi bi-pen me-2"></i>Assinatura de Recebimento
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                
                <div class="modal-body">
                    <!-- Info do funcionário -->
                    <div class="alert alert-info d-flex align-items-center mb-4">
                        <i class="bi bi-person-check fs-4 me-3"></i>
                        <div>
                            Eu, <strong id="modalFuncionarioNome"></strong>, confirmo o recebimento do EPI descrito.
                        </div>
                    </div>

                    <!-- Tabs de opção -->
                    <ul class="nav nav-tabs" id="assinaturaTabsModal" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="draw-tab-modal" data-bs-toggle="tab" data-bs-target="#draw-pane-modal" type="button">
                                <i class="bi bi-pencil me-1"></i> Desenhar
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="upload-tab-modal" data-bs-toggle="tab" data-bs-target="#upload-pane-modal" type="button">
                                <i class="bi bi-upload me-1"></i> Anexar Imagem
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content border border-top-0 rounded-bottom p-3" id="assinaturaTabsContentModal">
                        <!-- Tab: Desenhar -->
                        <div class="tab-pane fade show active" id="draw-pane-modal" role="tabpanel">
                            <label class="form-label fw-semibold">Campo para Assinatura:</label>
                            <div class="border rounded bg-white position-relative" style="height: 200px;">
                                <canvas id="signature-canvas-modal" style="width: 100%; height: 100%; cursor: crosshair;"></canvas>
                            </div>
                            <input type="hidden" name="assinatura_base64" id="assinatura_base64_modal">
                            <small class="text-muted">Use o mouse ou toque para assinar</small>
                        </div>
                        
                        <!-- Tab: Upload -->
                        <div class="tab-pane fade" id="upload-pane-modal" role="tabpanel">
                            <label for="assinatura_imagem_upload_modal" class="form-label fw-semibold">
                                Fazer Upload de Assinatura:
                            </label>
                            <input class="form-control" type="file" id="assinatura_imagem_upload_modal" 
                                   name="assinatura_imagem" accept="image/png, image/jpeg">
                            <small class="text-muted">Formatos aceitos: PNG, JPEG</small>
                        </div>
                    </div>
                </div>
                
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-outline-secondary" id="clear-signature-modal">
                        <i class="bi bi-eraser me-1"></i> Limpar
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i> Salvar Assinatura
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Script do SignaturePad -->
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('assinaturaModal');
    const canvas = document.getElementById('signature-canvas-modal');
    const clearBtn = document.getElementById('clear-signature-modal');
    const hiddenInput = document.getElementById('assinatura_base64_modal');
    const form = document.getElementById('formAssinaturaModal');
    let signaturePad;

    function resizeCanvas() {
        if (canvas && signaturePad) {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * ratio;
            canvas.height = rect.height * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
    }

    modal.addEventListener('show.bs.modal', function(event) {
        const button = event.relatedTarget;
        const formUrl = button.getAttribute('data-form-url');
        const funcionarioNome = button.getAttribute('data-funcionario-nome');
        
        form.action = formUrl || '';
        document.getElementById('modalFuncionarioNome').textContent = funcionarioNome || '';
    });

    modal.addEventListener('shown.bs.modal', function() {
        signaturePad = new SignaturePad(canvas, {
            backgroundColor: 'rgb(255, 255, 255)',
            penColor: 'rgb(0, 0, 0)'
        });
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
    });

    modal.addEventListener('hidden.bs.modal', function() {
        window.removeEventListener('resize', resizeCanvas);
        if (signaturePad) signaturePad.clear();
    });

    clearBtn.addEventListener('click', function() {
        if (signaturePad) signaturePad.clear();
    });

    form.addEventListener('submit', function(e) {
        if (signaturePad && !signaturePad.isEmpty()) {
            hiddenInput.value = signaturePad.toDataURL('image/png');
        }
    });
});
</script>
