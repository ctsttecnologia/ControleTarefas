
   <!-- templates/tarefas/confirmar_exclusao.html -->
{% extends 'base.html' %}

{% block title %}Excluir Tarefa{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white text-center py-3">
                    <i class="bi bi-exclamation-triangle-fill fs-4 me-2"></i>
                    <span class="fw-semibold">Confirmar Exclusão</span>
                </div>
                <div class="card-body text-center p-4">
                    <div class="rounded-circle bg-danger bg-opacity-10 d-inline-flex align-items-center justify-content-center mb-4"
                         style="width: 80px; height: 80px;">
                        <i class="bi bi-trash text-danger fs-1"></i>
                    </div>

                    <h5 class="mb-3">Deseja realmente excluir?</h5>

                    <div class="alert alert-warning py-3">
                        <i class="bi bi-clipboard-check me-2"></i>
                        <strong>"{{ object.titulo }}"</strong>
                    </div>

                    <p class="text-muted small">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        Esta ação não poderá ser desfeita. Todos os comentários e históricos serão removidos.
                    </p>
                </div>
                <div class="card-footer bg-light py-3">
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'tarefas:listar_tarefas' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-1"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash me-1"></i> Sim, Excluir
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
