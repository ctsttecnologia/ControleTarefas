

<!-- CSS para o partial (adicionar no base.html ou extra_css) -->

{% extends "base.html" %}


<style>
.views-nav {
    margin-bottom: 1.25rem;
}

.views-nav-inner {
    display: flex;
    gap: 0.35rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
}

.views-nav-inner::-webkit-scrollbar {
    display: none;
}

.views-nav-item {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.4rem 0.85rem;
    border-radius: 8px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--list-text-muted, #6b7280);
    background: var(--list-card-bg, #fff);
    border: 1px solid var(--list-card-border, #e2e6ee);
    text-decoration: none;
    white-space: nowrap;
    transition: all 0.15s ease;
}

.views-nav-item:hover {
    color: #6366f1;
    border-color: #6366f1;
    transform: translateY(-1px);
}

.views-nav-item.active {
    background: #6366f1;
    color: #fff;
    border-color: #6366f1;
}

.views-nav-item i {
    font-size: 0.85rem;
}

@media (max-width: 575.98px) {
    .views-nav-item span {
        display: none;
    }
    .views-nav-item {
        padding: 0.4rem 0.6rem;
    }
}
/* ── Histórico: marca "Sistema" para registros sem autor ── */
.history-author-system {
    font-weight: 600;
    color: var(--detail-text-muted);
    font-style: italic;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
}

.history-author-system i {
    font-size: 0.7rem;
    opacity: 0.7;
}

</style>
